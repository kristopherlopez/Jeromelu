[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "youtube-utils"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "youtube-transcript-api>=1.0",
    "yt-dlp>=2025.1",
    "feedparser>=6.0",
]

[tool.setuptools.packages.find]
include = ["youtube_utils*"]
