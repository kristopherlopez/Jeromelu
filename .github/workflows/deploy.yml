name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-2
  ECR_REGISTRY: 111424988703.dkr.ecr.ap-southeast-2.amazonaws.com

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.changes.outputs.api }}
      web: ${{ steps.changes.outputs.web }}
      db: ${{ steps.changes.outputs.db }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            api:
              - 'services/api/**'
              - 'packages/shared/**'
            web:
              - 'services/web/**'
            db:
              - 'packages/db/**'

  build-and-push:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            path: services/api
            ecr_repo: jeromelu/api
            changed: ${{ needs.detect-changes.outputs.api }}
          - service: web
            path: services/web
            ecr_repo: jeromelu/web
            changed: ${{ needs.detect-changes.outputs.web }}
    steps:
      - name: Skip if unchanged
        if: matrix.changed != 'true'
        run: echo "No changes in ${{ matrix.service }}, skipping."

      - uses: actions/checkout@v4
        if: matrix.changed == 'true'

      - name: Configure AWS credentials
        if: matrix.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: matrix.changed == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        if: matrix.changed == 'true'
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/${{ matrix.ecr_repo }}"
          docker build -f ${{ matrix.path }}/Dockerfile -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

  deploy-lightsail:
    needs: [detect-changes, build-and-push]
    if: needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.web == 'true'
    # Runs on the self-hosted runner installed on the Lightsail box itself —
    # no inbound SSH from GitHub required, so the firewall can keep port 22
    # locked to the operator's IP. See docs/ops/ci-runner.md.
    runs-on: [self-hosted, jeromelu-prod]
    steps:
      - name: Pull master and redeploy
        # Deploys :latest (which build-and-push pushes alongside the SHA tag).
        # Can't pin to ${{ github.sha }} here: path-filter builds only one of
        # api/web per push, so the SHA tag won't exist for the unchanged image.
        # For manual rollback, ssh in and run with IMAGE_TAG=<sha>.
        run: |
          cd /opt/jeromelu
          git pull --ff-only
          /opt/jeromelu/scripts/lightsail-deploy.sh

  invalidate-cdn:
    needs: [detect-changes, deploy-lightsail]
    if: needs.detect-changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E2G6FL11A3JP8F \
            --paths "/*"

  migrate:
    needs: detect-changes
    if: needs.detect-changes.outputs.db == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Notify migration needed
        run: |
          echo "Database migration detected. Run manually on Lightsail:"
          echo "  ssh jeromelu-prod 'cd /opt/jeromelu && bash packages/db/migrate.sh'"
          echo "Automated migration disabled for safety. Trigger via workflow_dispatch when reviewed."
