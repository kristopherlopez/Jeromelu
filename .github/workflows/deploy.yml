name: Build & Deploy

# Gated on `Tests` workflow success. The `tests.yml` job set (pytest,
# web-typecheck, web-lint, ruff, pyright, gitleaks) runs on every push
# to master; on green completion this workflow fires via workflow_run
# and either deploys (if any of api/web/video-worker/deploy_only paths
# changed) or no-ops (path filter has nothing to build).
#
# `workflow_dispatch` is the emergency-override path — runs immediately
# regardless of Tests state. Use sparingly; the gate exists to stop bad
# code shipping.
#
# Per docs/build/META.md "Run reports" — TASK-51 (Engineering quality
# hardening — Tier 1) landed this gate 2026-05-28.
on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
    branches: [master]
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-2
  ECR_REGISTRY: 111424988703.dkr.ecr.ap-southeast-2.amazonaws.com

permissions:
  id-token: write
  contents: read

jobs:
  # Path filters scope this pipeline to the Lightsail compose stack only:
  # api + web (built and deployed) and db (notify-only migrations).
  # Out of scope by design:
  #   - services/gpu — deployed separately via services/gpu/deploy.py +
  #     services/gpu/build_and_push.sh (different runtime, different cadence).
  #   - Anything else under services/ — add a filter + matrix entry here if
  #     a new service should ride this pipeline.
  detect-changes:
    runs-on: ubuntu-latest
    # Guard: under workflow_run trigger, only proceed if Tests was
    # green; under workflow_dispatch (manual), proceed unconditionally.
    # Every downstream job `needs: detect-changes`, so this single
    # if-guard gates the whole pipeline.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      api: ${{ steps.changes.outputs.api }}
      web: ${{ steps.changes.outputs.web }}
      video_worker: ${{ steps.changes.outputs.video_worker }}
      db: ${{ steps.changes.outputs.db }}
      deploy_only: ${{ steps.changes.outputs.deploy_only }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            api:
              - 'services/api/**'
              - 'packages/shared/**'
            web:
              - 'services/web/**'
            video_worker:
              - 'services/video-worker/**'
            db:
              - 'packages/db/**'
            deploy_only:
              - 'scripts/lightsail-deploy.sh'
              - 'scripts/cron.d/**'
              - 'docker/docker-compose.prod.yml'
              - 'docker/Caddyfile'

  build-and-push:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            path: services/api
            ecr_repo: jeromelu/api
            changed: ${{ needs.detect-changes.outputs.api }}
          - service: web
            path: services/web
            ecr_repo: jeromelu/web
            changed: ${{ needs.detect-changes.outputs.web }}
          - service: video-worker
            path: services/video-worker
            ecr_repo: jeromelu/video-worker
            changed: ${{ needs.detect-changes.outputs.video_worker }}
    steps:
      - name: Skip if unchanged
        if: matrix.changed != 'true'
        run: echo "No changes in ${{ matrix.service }}, skipping."

      - uses: actions/checkout@v6
        if: matrix.changed == 'true'

      - name: Configure AWS credentials
        if: matrix.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: matrix.changed == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        if: matrix.changed == 'true'
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/${{ matrix.ecr_repo }}"
          # Under workflow_run, github.sha is the default-branch HEAD
          # at action-dispatch time, which may drift from the SHA Tests
          # actually validated. Use head_sha from the upstream workflow_run
          # event for fidelity; fall back to github.sha for
          # workflow_dispatch (where workflow_run context is absent).
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          docker build -f ${{ matrix.path }}/Dockerfile -t $IMAGE:$SHA -t $IMAGE:latest .
          docker push $IMAGE:$SHA
          docker push $IMAGE:latest

  deploy-lightsail:
    needs: [detect-changes, build-and-push]
    if: >-
      needs.detect-changes.outputs.api == 'true' ||
      needs.detect-changes.outputs.web == 'true' ||
      needs.detect-changes.outputs.video_worker == 'true' ||
      needs.detect-changes.outputs.deploy_only == 'true'
    # Runs on the self-hosted runner installed on the Lightsail box itself —
    # no inbound SSH from GitHub required, so the firewall can keep port 22
    # locked to the operator's IP. See docs/ops/ci-cd.md.
    runs-on: [self-hosted, jeromelu-prod]
    steps:
      - name: Pull master and redeploy
        # Deploys :latest (which build-and-push pushes alongside the SHA tag).
        # Can't pin to ${{ github.sha }} here: path-filter builds only one of
        # api/web per push, so the SHA tag won't exist for the unchanged image.
        # For manual rollback, ssh in and run with IMAGE_TAG=<sha>.
        run: |
          cd /opt/jeromelu
          git pull --ff-only
          /opt/jeromelu/scripts/lightsail-deploy.sh

  invalidate-cdn:
    needs: [detect-changes, deploy-lightsail]
    if: needs.detect-changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E2G6FL11A3JP8F \
            --paths "/*"

  migrate:
    needs: detect-changes
    if: needs.detect-changes.outputs.db == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Notify migration needed
        run: |
          echo "Database migration detected. Run manually on Lightsail:"
          echo "  ssh jeromelu-prod 'cd /opt/jeromelu && bash packages/db/migrate.sh'"
          echo "Automated migration disabled for safety. Trigger via workflow_dispatch when reviewed."
