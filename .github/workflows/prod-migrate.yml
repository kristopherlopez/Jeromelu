name: One-off prod migrate

# TEMPORARY workflow added to run pending DB migrations on the Lightsail
# self-hosted runner. Gated to workflow_dispatch only — never auto-fires on
# push. Will be removed immediately after the run completes.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrate:
    runs-on: [self-hosted, jeromelu-prod]
    steps:
      - name: Pull master and show status
        working-directory: /opt/jeromelu
        run: |
          set -euo pipefail
          git pull --ff-only
          set -a
          source /opt/jeromelu/.env
          set +a
          export DATABASE_URL="postgresql://jeromelu_admin:${POSTGRES_PASSWORD}@127.0.0.1:5432/jeromelu"
          echo "── status BEFORE ──"
          bash packages/db/migrate.sh --status

      - name: Apply pending migrations
        working-directory: /opt/jeromelu
        run: |
          set -euo pipefail
          set -a
          source /opt/jeromelu/.env
          set +a
          export DATABASE_URL="postgresql://jeromelu_admin:${POSTGRES_PASSWORD}@127.0.0.1:5432/jeromelu"
          bash packages/db/migrate.sh

      - name: Status AFTER
        working-directory: /opt/jeromelu
        run: |
          set -euo pipefail
          set -a
          source /opt/jeromelu/.env
          set +a
          export DATABASE_URL="postgresql://jeromelu_admin:${POSTGRES_PASSWORD}@127.0.0.1:5432/jeromelu"
          bash packages/db/migrate.sh --status
