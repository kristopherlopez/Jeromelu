# Production compose for Lightsail. Layout:
#   caddy (TLS, :80/:443)  -->  web (Next.js :3000)
#                          \--> api  (FastAPI :8000)
#   postgres (pgvector/pg16, local volume, not exposed publicly)
#
# Required environment (sourced from /opt/jeromelu/.env on the host):
#   POSTGRES_PASSWORD       — db password (rotate from current RDS password on cutover)
#   OPENAI_API_KEY
#   ANTHROPIC_API_KEY       — required for Claude-Agent-SDK agents (Scout, etc.)
#   YOUTUBE_API_KEY         — Scout's YouTube Data API v3 discovery tools
#   ADMIN_KEY               — protects /api/admin/*
#   AWS_ACCESS_KEY_ID       — for S3 access from api / pg-backup cron
#   AWS_SECRET_ACCESS_KEY
#   IMAGE_TAG               — git sha pushed by CI; defaults to latest
#
# Bring up:    docker compose -f docker-compose.prod.yml up -d
# Tear down:   docker compose -f docker-compose.prod.yml down

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jeromelu-postgres
    restart: unless-stopped
    # Bind to host loopback only so SSH-tunneled GUI clients (pgAdmin, etc.)
    # can reach Postgres without exposing it to the public internet.
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: jeromelu
      POSTGRES_USER: jeromelu_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../packages/db/migrations:/migrations:ro
      - ../packages/db/docker-entrypoint-initdb.sh:/docker-entrypoint-initdb.d/00_migrate.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeromelu_admin -d jeromelu"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${ECR_REGISTRY:-111424988703.dkr.ecr.ap-southeast-2.amazonaws.com}/jeromelu/api:${IMAGE_TAG:-latest}
    container_name: jeromelu-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://jeromelu_admin:${POSTGRES_PASSWORD}@postgres:5432/jeromelu
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      ADMIN_KEY: ${ADMIN_KEY}
      # Pydantic-settings reads `admin_api_key` from ADMIN_API_KEY env var,
      # so route the same secret under both names. Without this the api
      # falls back to the dev default 'local-dev-admin-key'.
      ADMIN_API_KEY: ${ADMIN_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ap-southeast-2
      S3_RAW_BUCKET: jeromelu-raw-transcripts
      S3_CLEAN_BUCKET: jeromelu-clean-documents
      S3_ASSETS_BUCKET: jeromelu-public-assets
      S3_AGENT_LOGS_BUCKET: jeromelu-clean-documents
      # Empty string overrides the dev default (http://localhost:9000 / MinIO)
      # so jeromelu_shared.s3.get_s3_client() falls through to real AWS S3 in
      # ap-southeast-2 with the AWS_* creds above.
      S3_ENDPOINT: ""
      # Visual ID inference runs on the GPU service via SageMaker Async; the
      # API container has no insightface/onnxruntime/cv2 installed. Default
      # to remote here so even if /opt/jeromelu/.env doesn't set it, prod
      # never tries to load the missing inline path.
      LINEUP_REMOTE: ${LINEUP_REMOTE:-1}
      ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ${ECR_REGISTRY:-111424988703.dkr.ecr.ap-southeast-2.amazonaws.com}/jeromelu/web:${IMAGE_TAG:-latest}
    container_name: jeromelu-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://api.jeromelu.ai
      NODE_ENV: production
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    container_name: jeromelu-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

volumes:
  postgres_data:
    name: jeromelu_postgres_data
  caddy_data:
    name: jeromelu_caddy_data
  caddy_config:
    name: jeromelu_caddy_config
