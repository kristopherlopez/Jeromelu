services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jeromelu-postgres
    ports:
      - "5440:5432"
    environment:
      POSTGRES_DB: jeromelu
      POSTGRES_USER: jeromelu_admin
      POSTGRES_PASSWORD: localdev123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../packages/db/migrations:/migrations
      - ../packages/db/docker-entrypoint-initdb.sh:/docker-entrypoint-initdb.d/00_migrate.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeromelu_admin -d jeromelu"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: jeromelu-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  temporal:
    image: temporalio/auto-setup:latest
    container_name: jeromelu-temporal
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=jeromelu_admin
      - POSTGRES_PWD=localdev123
      - POSTGRES_SEEDS=postgres
      - TEMPORAL_NAMESPACE=jeromelu
      - SKIP_DYNAMIC_CONFIG=true
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:latest
    container_name: jeromelu-temporal-ui
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    depends_on:
      - temporal

  worker-ingestion:
    build:
      context: ..
      dockerfile: services/worker-ingestion/Dockerfile
    container_name: jeromelu-worker-ingestion
    environment:
      - DATABASE_URL=postgresql+psycopg://jeromelu_admin:localdev123@postgres:5432/jeromelu
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=jeromelu
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=jeromelu
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
      minio:
        condition: service_started

  # yt-dlp + ffmpeg sidecar (see feedback_api_container_lean.md). In prod
  # the API container talks to it via docker DNS at video-worker:8000. In
  # local dev the API runs on the host (uvicorn), so we publish 8001 on the
  # host and the API must override VIDEO_WORKER_URL=http://localhost:8001.
  # AWS creds come from the host's ~/.aws (mounted read-only) so the worker
  # talks to the real jeromelu-raw-transcripts bucket and can yt-dlp the
  # persistent S3 fast-path.
  video-worker:
    build:
      context: ..
      dockerfile: services/video-worker/Dockerfile
    container_name: jeromelu-video-worker
    ports:
      - "8001:8000"
    environment:
      - AWS_DEFAULT_REGION=ap-southeast-2
      # Persistent .video.mp4 files live in jeromelu-raw-audio (see
      # packages/shared/jeromelu_shared/config.py:s3_audio_bucket and
      # services/api/app/scout/video.py). The worker's own default
      # ("jeromelu-raw-transcripts") and the prod compose are wrong —
      # leaving that default in causes HeadObject 404 on reassign.
      - S3_AUDIO_BUCKET=jeromelu-raw-audio
      - AWS_PROFILE=${AWS_PROFILE:-default}
    volumes:
      - ${USERPROFILE:-${HOME}}/.aws:/root/.aws:ro

volumes:
  postgres_data:
  minio_data:
