services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jeromelu-postgres
    ports:
      - "5440:5432"
    environment:
      POSTGRES_DB: jeromelu
      POSTGRES_USER: jeromelu_admin
      POSTGRES_PASSWORD: localdev123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../packages/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeromelu_admin -d jeromelu"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: jeromelu-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  temporal:
    image: temporalio/auto-setup:latest
    container_name: jeromelu-temporal
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=jeromelu_admin
      - POSTGRES_PWD=localdev123
      - POSTGRES_SEEDS=postgres
      - TEMPORAL_NAMESPACE=jeromelu
      - SKIP_DYNAMIC_CONFIG=true
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:latest
    container_name: jeromelu-temporal-ui
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    depends_on:
      - temporal

volumes:
  postgres_data:
  minio_data:
