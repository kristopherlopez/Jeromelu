<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transcript Debug — Segment Diff</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #242834; --border: #2e3348;
    --text: #e1e4ed; --muted: #8b90a0; --accent: #6c7ee1;
    --add: #22c55e; --del: #ef4444; --change: #f59e0b;
    --add-bg: rgba(34,197,94,0.12); --del-bg: rgba(239,68,68,0.12); --change-bg: rgba(245,158,11,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .header h1 { font-size: 16px; font-weight: 600; white-space: nowrap; }
  .header select, .header input, .header button {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 6px 12px; border-radius: 6px; font-size: 13px;
  }
  .header select, .header button { cursor: pointer; }
  .header button:hover { border-color: var(--accent); }
  .header button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .header input { width: 160px; }
  .header .spacer { flex: 1; }
  .header .stat { font-size: 12px; color: var(--muted); padding: 4px 10px; background: var(--surface); border-radius: 4px; }
  .header .stat b { color: var(--text); }

  /* File list view */
  .file-list { padding: 40px; max-width: 800px; margin: 0 auto; }
  .file-list h2 { font-size: 20px; margin-bottom: 8px; }
  .file-list p { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .file-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; margin-bottom: 12px; cursor: pointer; transition: border-color 0.15s;
  }
  .file-card:hover { border-color: var(--accent); }
  .file-card h3 { font-size: 15px; margin-bottom: 4px; }
  .file-card .meta { font-size: 12px; color: var(--muted); display: flex; gap: 16px; flex-wrap: wrap; }
  .file-card .meta span { display: flex; align-items: center; gap: 4px; }
  .file-card .layers { display: flex; gap: 6px; margin-top: 8px; }
  .layer-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
  .layer-badge.raw { background: rgba(239,68,68,0.15); color: var(--del); }
  .layer-badge.clean { background: rgba(245,158,11,0.15); color: var(--change); }
  .layer-badge.analysed { background: rgba(34,197,94,0.15); color: var(--add); }

  /* Diff view */
  .diff-view { height: calc(100vh - 49px); display: flex; flex-direction: column; }
  .diff-controls { padding: 8px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
  .diff-body { flex: 1; overflow-y: auto; padding: 0; }

  /* Segment rows */
  .seg-row {
    display: grid; grid-template-columns: 60px 1fr 1fr; border-bottom: 1px solid var(--border);
    font-size: 13px; line-height: 1.5; min-height: 32px;
  }
  .seg-row.three-col { grid-template-columns: 60px 1fr 1fr 1fr; }
  .seg-row .seg-idx {
    padding: 6px 8px; text-align: right; font-family: monospace; font-size: 11px;
    color: var(--muted); background: var(--surface); border-right: 1px solid var(--border);
    position: sticky; left: 0;
  }
  .seg-row .seg-cell { padding: 6px 12px; border-right: 1px solid var(--border); word-wrap: break-word; }
  .seg-row .seg-cell:last-child { border-right: none; }
  .seg-row.diff .seg-cell { background: var(--change-bg); }
  .seg-row.same .seg-cell { }
  .seg-row.header-row { position: sticky; top: 0; z-index: 10; background: var(--surface2); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.3px; color: var(--muted); }
  .seg-row.header-row .seg-cell { padding: 8px 12px; }
  .seg-row.chapter-break { background: var(--surface2); }
  .seg-row.chapter-break .seg-cell { padding: 8px 12px; font-weight: 600; color: var(--accent); font-size: 12px; }

  /* Inline diff highlights */
  .diff-add { background: var(--add-bg); color: var(--add); padding: 1px 2px; border-radius: 2px; }
  .diff-del { background: var(--del-bg); color: var(--del); padding: 1px 2px; border-radius: 2px; text-decoration: line-through; }

  /* Jump to diff */
  .diff-nav { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 6px; z-index: 100; }
  .diff-nav button {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    width: 40px; height: 40px; border-radius: 8px; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .diff-nav button:hover { border-color: var(--accent); }

  .hidden { display: none; }
  .chip { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-right: 4px; }
  .chip-change { background: var(--change-bg); color: var(--change); }
  .chip-count { background: rgba(108,126,225,0.15); color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <h1>Transcript Debug</h1>
  <button id="btnBack" class="hidden" onclick="showFileList()">< Files</button>
  <select id="layerSelect" class="hidden">
    <option value="raw-clean">Raw vs Clean (Phase 1)</option>
    <option value="clean-analysed">Clean vs Analysed (Phase 3)</option>
    <option value="raw-analysed">Raw vs Analysed (Full Pipeline)</option>
    <option value="all">All Three Layers</option>
  </select>
  <button id="btnDiffsOnly" class="hidden" onclick="toggleDiffsOnly()">Diffs Only</button>
  <input id="searchBox" class="hidden" type="text" placeholder="Search text..." />
  <span class="spacer"></span>
  <span id="statsBar" class="hidden"></span>
</div>

<div id="fileListView" class="file-list"></div>

<div id="diffView" class="diff-view hidden">
  <div class="diff-body" id="diffBody"></div>
  <div class="diff-nav" id="diffNav">
    <button onclick="jumpDiff(-1)" title="Previous diff">&#8593;</button>
    <button onclick="jumpDiff(1)" title="Next diff">&#8595;</button>
  </div>
</div>

<script>
const DATA_BASE = '../data/transcripts';
const PATHS = {
  raw: (id) => `${DATA_BASE}/raw/${id}.json`,
  rawArchive: (id) => `${DATA_BASE}/archive/raw/${id}.json`,
  clean: (id) => `${DATA_BASE}/clean/${id}.json`,
  cleanArchive: (id) => `${DATA_BASE}/archive/clean/${id}.json`,
  analysedClean: (id) => `${DATA_BASE}/analysed/${id}.clean.json`,
  manifest: (id) => `${DATA_BASE}/analysed/${id}.manifest.json`,
  topics: (id) => `${DATA_BASE}/analysed/${id}.topics.json`,
  claims: (id) => `${DATA_BASE}/analysed/${id}.claims.json`,
};

let state = {
  transcripts: {},  // id -> { raw, clean, analysedClean, manifest, topics, claims }
  activeId: null,
  layer: 'raw-analysed',
  diffsOnly: false,
  searchQuery: '',
  diffIndices: [],
  currentDiffIdx: -1,
};

// Discovery: try to load known transcript IDs
const KNOWN_IDS = [
  'UCs5CHx-kIwy2NF9DFesWE8w_2OMefy0SMeo',
  'UCs5CHx-kIwy2NF9DFesWE8w_8Kc3P1BQEUE',
  'UC_clPgZzNNheN1-wK0Ngbow_0KjdUZnMwwA',
  'UC5VEgd54Vr7J__gyQhCVd6Q_gkqXsokyWzc',
  'UC5WGzA6l4VztUuW_Q477WuQ_ZRmDnMXNJMQ',
  'UCf1s3PC9aOw5MUOcklUWosg_LAqgZITJloo',
  'UCf1s3PC9aOw5MUOcklUWosg_mRe9hdLvLqU',
  'UCMReymNfmodE1OEc9fQvwQQ_QMRJ5yFEmxI',
  'UCs5CHx-kIwy2NF9DFesWE8w__I9aX-2UNa8',
  'UCs5CHx-kIwy2NF9DFesWE8w_pZVYbo5-RCo',
];

async function tryFetch(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function discover() {
  const el = document.getElementById('fileListView');
  el.innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px">Scanning for transcripts...</p>';

  const promises = KNOWN_IDS.map(async (id) => {
    const entry = { id, raw: null, clean: null, analysedClean: null, manifest: null, topics: null, claims: null };

    // Try loading in parallel
    const [raw, rawArch, clean, cleanArch, aClean, manifest, topics, claims] = await Promise.all([
      tryFetch(PATHS.raw(id)),
      tryFetch(PATHS.rawArchive(id)),
      tryFetch(PATHS.clean(id)),
      tryFetch(PATHS.cleanArchive(id)),
      tryFetch(PATHS.analysedClean(id)),
      tryFetch(PATHS.manifest(id)),
      tryFetch(PATHS.topics(id)),
      tryFetch(PATHS.claims(id)),
    ]);

    entry.raw = raw || rawArch;
    entry.clean = clean || cleanArch;
    entry.analysedClean = aClean;
    entry.manifest = manifest;
    entry.topics = topics;
    entry.claims = claims;

    // Only include if we found at least a raw file
    if (entry.raw || entry.clean || entry.analysedClean) {
      state.transcripts[id] = entry;
    }
  });

  await Promise.all(promises);
  renderFileList();
}

function renderFileList() {
  const el = document.getElementById('fileListView');
  const ids = Object.keys(state.transcripts);

  if (ids.length === 0) {
    el.innerHTML = `<h2>No transcripts found</h2>
      <p>Make sure you're serving this file from the project root so relative paths resolve correctly.</p>
      <p style="margin-top:12px">Try: <code>cd C:/Users/krist/ClaudeProjects/Jeromelu && python -m http.server 8080</code><br>
      Then open <code>http://localhost:8080/tools/transcript-debug.html</code></p>`;
    return;
  }

  let html = `<h2>Available Transcripts (${ids.length})</h2>
    <p>Click a transcript to view segment-by-segment diff across pipeline stages.</p>`;

  ids.forEach(id => {
    const t = state.transcripts[id];
    const title = t.raw?.title || t.clean?.title || t.analysedClean?.title || id;
    const rawSegs = t.raw?.segments?.length || 0;
    const cleanSegs = t.clean?.segments?.length || 0;
    const aSegs = t.analysedClean?.segments?.length || 0;
    const round = t.manifest?.round_context?.round || '?';
    const claimCount = t.claims?.length || 0;
    const chapters = t.manifest?.phase2?.chapters_detected || 0;
    const corrections = (t.manifest?.phase1?.deterministic_corrections || 0) + (t.manifest?.phase1?.phonetic_corrections || 0);
    const specialistCorr = t.manifest?.phase3?.name_corrections_applied || 0;

    // Count diffs between raw and analysed
    let diffCount = 0;
    if (t.raw && t.analysedClean) {
      const maxSegs = Math.max(rawSegs, aSegs);
      for (let i = 0; i < maxSegs; i++) {
        const rText = t.raw.segments?.[i]?.text || '';
        const aText = t.analysedClean.segments?.[i]?.text || '';
        if (rText !== aText) diffCount++;
      }
    }

    html += `<div class="file-card" onclick="openTranscript('${id}')">
      <h3>${cleanTitle(title)}</h3>
      <div class="meta">
        <span>Round ${round}</span>
        <span>${rawSegs} segments</span>
        <span>${claimCount} claims</span>
        <span>${chapters} chapters</span>
      </div>
      <div class="layers">
        ${t.raw ? '<span class="layer-badge raw">RAW</span>' : ''}
        ${t.clean ? `<span class="layer-badge clean">CLEAN (${corrections} fixes)</span>` : ''}
        ${t.analysedClean ? `<span class="layer-badge analysed">ANALYSED (+${specialistCorr} fixes)</span>` : ''}
        ${diffCount ? `<span class="chip chip-change">${diffCount} diffs</span>` : ''}
      </div>
    </div>`;
  });

  el.innerHTML = html;
}

function cleanTitle(t) {
  return t.replace(/[\u{10000}-\u{10FFFF}]/gu, '').trim();
}

function openTranscript(id) {
  state.activeId = id;
  state.diffsOnly = false;
  state.searchQuery = '';
  state.currentDiffIdx = -1;
  document.getElementById('fileListView').classList.add('hidden');
  document.getElementById('diffView').classList.remove('hidden');
  document.getElementById('btnBack').classList.remove('hidden');
  document.getElementById('layerSelect').classList.remove('hidden');
  document.getElementById('btnDiffsOnly').classList.remove('hidden');
  document.getElementById('searchBox').classList.remove('hidden');
  document.getElementById('statsBar').classList.remove('hidden');
  document.getElementById('layerSelect').value = state.layer;
  renderDiff();
}

function showFileList() {
  state.activeId = null;
  document.getElementById('fileListView').classList.remove('hidden');
  document.getElementById('diffView').classList.add('hidden');
  document.getElementById('btnBack').classList.add('hidden');
  document.getElementById('layerSelect').classList.add('hidden');
  document.getElementById('btnDiffsOnly').classList.add('hidden');
  document.getElementById('searchBox').classList.add('hidden');
  document.getElementById('statsBar').classList.add('hidden');
}

document.getElementById('layerSelect').addEventListener('change', e => {
  state.layer = e.target.value;
  renderDiff();
});

document.getElementById('searchBox').addEventListener('input', e => {
  state.searchQuery = e.target.value.toLowerCase();
  renderDiff();
});

function toggleDiffsOnly() {
  state.diffsOnly = !state.diffsOnly;
  document.getElementById('btnDiffsOnly').classList.toggle('active', state.diffsOnly);
  renderDiff();
}

function renderDiff() {
  const t = state.transcripts[state.activeId];
  if (!t) return;

  const threeCol = state.layer === 'all';
  const body = document.getElementById('diffBody');

  // Determine which columns to show
  let leftSegs, rightSegs, leftLabel, rightLabel, midSegs, midLabel;
  if (state.layer === 'raw-clean') {
    leftSegs = t.raw?.segments || []; rightSegs = t.clean?.segments || [];
    leftLabel = 'RAW'; rightLabel = 'CLEAN (Phase 1)';
  } else if (state.layer === 'clean-analysed') {
    leftSegs = t.clean?.segments || []; rightSegs = t.analysedClean?.segments || [];
    leftLabel = 'CLEAN (Phase 1)'; rightLabel = 'ANALYSED (Phase 1+3)';
  } else if (state.layer === 'raw-analysed') {
    leftSegs = t.raw?.segments || []; rightSegs = t.analysedClean?.segments || [];
    leftLabel = 'RAW'; rightLabel = 'ANALYSED (Full Pipeline)';
  } else {
    leftSegs = t.raw?.segments || []; midSegs = t.clean?.segments || []; rightSegs = t.analysedClean?.segments || [];
    leftLabel = 'RAW'; midLabel = 'CLEAN (Phase 1)'; rightLabel = 'ANALYSED (Phase 1+3)';
  }

  const maxLen = Math.max(leftSegs.length, rightSegs?.length || 0, midSegs?.length || 0);

  // Build chapter index from topics
  const chapterStarts = {};
  if (t.topics?.chapters) {
    t.topics.chapters.forEach(ch => {
      chapterStarts[ch.start_seg_idx] = ch;
    });
  }

  // Count diffs and build index
  let diffCount = 0;
  state.diffIndices = [];

  let html = '';

  // Header row
  if (threeCol) {
    html += `<div class="seg-row three-col header-row">
      <div class="seg-idx">#</div>
      <div class="seg-cell">${leftLabel}</div>
      <div class="seg-cell">${midLabel}</div>
      <div class="seg-cell">${rightLabel}</div>
    </div>`;
  } else {
    html += `<div class="seg-row header-row">
      <div class="seg-idx">#</div>
      <div class="seg-cell">${leftLabel}</div>
      <div class="seg-cell">${rightLabel}</div>
    </div>`;
  }

  for (let i = 0; i < maxLen; i++) {
    const lText = leftSegs[i]?.text || '';
    const rText = rightSegs[i]?.text || '';
    const mText = midSegs ? (midSegs[i]?.text || '') : null;
    const isDiff = threeCol ? (lText !== mText || mText !== rText || lText !== rText) : (lText !== rText);

    if (isDiff) {
      diffCount++;
      state.diffIndices.push(i);
    }

    // Search filter
    if (state.searchQuery) {
      const haystack = (lText + ' ' + rText + ' ' + (mText || '')).toLowerCase();
      if (!haystack.includes(state.searchQuery)) continue;
    }

    if (state.diffsOnly && !isDiff) continue;

    // Chapter break
    if (chapterStarts[i]) {
      const ch = chapterStarts[i];
      if (threeCol) {
        html += `<div class="seg-row three-col chapter-break" id="ch${ch.chapter_id}">
          <div class="seg-idx"></div>
          <div class="seg-cell" style="grid-column: 2 / -1">Ch${ch.chapter_id}: ${ch.title} (${ch.type})</div>
        </div>`;
      } else {
        html += `<div class="seg-row chapter-break" id="ch${ch.chapter_id}">
          <div class="seg-idx"></div>
          <div class="seg-cell" style="grid-column: 2 / -1">Ch${ch.chapter_id}: ${ch.title} (${ch.type})</div>
        </div>`;
      }
    }

    const rowClass = isDiff ? 'diff' : 'same';
    const ts = leftSegs[i]?.start != null ? formatTime(leftSegs[i].start) : '';

    if (threeCol) {
      const lrDiff = inlineDiff(lText, rText);
      const lmDiff = lText !== mText ? inlineDiff(lText, mText) : { left: esc(lText), right: esc(mText) };
      const mrDiff = mText !== rText ? inlineDiff(mText, rText) : { left: esc(mText), right: esc(rText) };

      html += `<div class="seg-row three-col ${rowClass}" data-idx="${i}" id="seg${i}">
        <div class="seg-idx" title="${ts}">${i}</div>
        <div class="seg-cell">${isDiff && lText !== mText ? lmDiff.left : esc(lText)}</div>
        <div class="seg-cell">${isDiff ? (lText !== mText ? lmDiff.right : (mText !== rText ? mrDiff.left : esc(mText))) : esc(mText)}</div>
        <div class="seg-cell">${isDiff && mText !== rText ? mrDiff.right : esc(rText)}</div>
      </div>`;
    } else {
      if (isDiff) {
        const d = inlineDiff(lText, rText);
        html += `<div class="seg-row ${rowClass}" data-idx="${i}" id="seg${i}">
          <div class="seg-idx" title="${ts}">${i}</div>
          <div class="seg-cell">${d.left}</div>
          <div class="seg-cell">${d.right}</div>
        </div>`;
      } else {
        html += `<div class="seg-row ${rowClass}" data-idx="${i}" id="seg${i}">
          <div class="seg-idx" title="${ts}">${i}</div>
          <div class="seg-cell">${esc(lText)}</div>
          <div class="seg-cell">${esc(rText)}</div>
        </div>`;
      }
    }
  }

  body.innerHTML = html;

  // Stats
  const statsEl = document.getElementById('statsBar');
  const shown = state.diffsOnly ? diffCount : maxLen;
  statsEl.innerHTML = `
    <span class="stat"><b>${diffCount}</b> diffs</span>
    <span class="stat"><b>${maxLen}</b> segments</span>
    <span class="stat"><b>${((diffCount/maxLen)*100).toFixed(1)}%</b> changed</span>
  `;
}

// Word-level inline diff
function inlineDiff(a, b) {
  const aWords = a.split(/(\s+)/);
  const bWords = b.split(/(\s+)/);
  const lcs = longestCommonSubseq(aWords, bWords);

  let leftHtml = '', rightHtml = '';
  let ai = 0, bi = 0, li = 0;

  while (ai < aWords.length || bi < bWords.length) {
    if (li < lcs.length && ai < aWords.length && aWords[ai] === lcs[li] && bi < bWords.length && bWords[bi] === lcs[li]) {
      leftHtml += esc(aWords[ai]);
      rightHtml += esc(bWords[bi]);
      ai++; bi++; li++;
    } else if (li < lcs.length && bi < bWords.length && bWords[bi] === lcs[li]) {
      // a has extra word (deleted)
      if (aWords[ai]?.trim()) {
        leftHtml += `<span class="diff-del">${esc(aWords[ai])}</span>`;
      } else {
        leftHtml += esc(aWords[ai] || '');
      }
      ai++;
    } else if (li < lcs.length && ai < aWords.length && aWords[ai] === lcs[li]) {
      // b has extra word (added)
      if (bWords[bi]?.trim()) {
        rightHtml += `<span class="diff-add">${esc(bWords[bi])}</span>`;
      } else {
        rightHtml += esc(bWords[bi] || '');
      }
      bi++;
    } else {
      // Both differ
      if (ai < aWords.length) {
        if (aWords[ai]?.trim()) {
          leftHtml += `<span class="diff-del">${esc(aWords[ai])}</span>`;
        } else {
          leftHtml += esc(aWords[ai]);
        }
        ai++;
      }
      if (bi < bWords.length) {
        if (bWords[bi]?.trim()) {
          rightHtml += `<span class="diff-add">${esc(bWords[bi])}</span>`;
        } else {
          rightHtml += esc(bWords[bi]);
        }
        bi++;
      }
    }
  }

  return { left: leftHtml, right: rightHtml };
}

function longestCommonSubseq(a, b) {
  const m = a.length, n = b.length;
  // Optimize for large arrays — limit to 2000 elements
  if (m > 2000 || n > 2000) {
    // Simple fallback: just find common words in order
    const result = [];
    let j = 0;
    for (let i = 0; i < m && j < n; i++) {
      while (j < n && b[j] !== a[i]) j++;
      if (j < n) { result.push(a[i]); j++; }
    }
    return result;
  }
  const dp = Array.from({ length: m + 1 }, () => new Uint16Array(n + 1));
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
    }
  }
  const result = [];
  let i = m, j = n;
  while (i > 0 && j > 0) {
    if (a[i-1] === b[j-1]) { result.unshift(a[i-1]); i--; j--; }
    else if (dp[i-1][j] > dp[i][j-1]) i--;
    else j--;
  }
  return result;
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function formatTime(ts) {
  if (ts == null) return '';
  const m = Math.floor(ts / 60);
  const s = Math.floor(ts % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function jumpDiff(dir) {
  if (!state.diffIndices.length) return;
  state.currentDiffIdx += dir;
  if (state.currentDiffIdx < 0) state.currentDiffIdx = state.diffIndices.length - 1;
  if (state.currentDiffIdx >= state.diffIndices.length) state.currentDiffIdx = 0;
  const segIdx = state.diffIndices[state.currentDiffIdx];
  const el = document.getElementById('seg' + segIdx);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'j' || e.key === 'ArrowDown' && e.altKey) { e.preventDefault(); jumpDiff(1); }
  if (e.key === 'k' || e.key === 'ArrowUp' && e.altKey) { e.preventDefault(); jumpDiff(-1); }
  if (e.key === 'd') { toggleDiffsOnly(); }
  if (e.key === 'Escape' && state.activeId) { showFileList(); }
});

// Init
discover();
</script>
</body>
