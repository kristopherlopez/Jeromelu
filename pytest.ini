[pytest]
testpaths = tests/unit
pythonpath = . services/api packages/shared
markers =
    unit: fast, no IO, no env vars (default for tests/unit/)
    integration: requires DB / S3 / external infra (tests/integration/)
    eval: LLM-graded evals via DeepEval (tests/evals/, costs $$ to run)
addopts = -ra --strict-markers
